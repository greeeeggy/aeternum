  flutter_tts: ^4.2.0
  flutter_background_service: ^5.0.9
  android_intent_plus: ^5.2.0
  googleapis: ^13.2.0
  extension_google_sign_in_as_googleapis_auth: ^2.0.12

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.6
  analyzer: ^6.4.1
  flutter_launcher_icons: ^0.14.4






flutter:
  uses-material-design: true
  assets:
    - assets/images/romantic_bg.jpg
    - assets/images/background_music.jpg
    - assets/images/header_bg_music.jpg
    - assets/images/player_background.jpg
    - assets/images/header_background.jpg
    - assets/images/class_schedule_background.jpg
    - assets/images/gcash_hannah.jpg
    - .env

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/aeternum_app_logo.png"  # Your logo path
  # Optional: if you want adaptive icons for Android
  adaptive_icon_background: "#00000000"  # Background color
  adaptive_icon_foreground: "assets/icons/aeternum_app_logo.png"
